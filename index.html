<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>天地图卫星地图 - 钓鱼助手</title>
  <script src="https://api.tianditu.gov.cn/api?v=4.0&tk=c6abc72f35da7d4565e99e0cef4443ae"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #mapDiv {
      width: 100%;
      height: 100%;
    }
    .controls {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn {
      background: rgba(255, 255, 255, 0.95);
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      color: #333;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn:active {
      background: rgba(240, 240, 240, 0.95);
    }
    .btn.active {
      background: #2196f3;
      color: white;
    }
    .info-panel {
      position: absolute;
      bottom: 20px;
      left: 10px;
      right: 10px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 1000;
    }
    .info-title {
      font-size: 16px;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }
    .info-coord {
      font-size: 13px;
      color: #666;
      font-family: monospace;
    }
    .tips {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #888;
      line-height: 1.6;
    }
    .tip-item {
      display: block;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 20px 30px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 2000;
    }
  </style>
</head>
<body>
  <div id="loading" class="loading">正在加载卫星地图...</div>
  <div id="mapDiv"></div>
  
  <div class="controls">
    <button class="btn" id="satelliteBtn" onclick="toggleLayer()">
      <span id="layerIcon">🛰️</span>
      <span id="layerText">卫星</span>
    </button>
    <button class="btn" onclick="zoomIn()">➕ 放大</button>
    <button class="btn" onclick="zoomOut()">➖ 缩小</button>
    <button class="btn" onclick="backToCenter()">📍 回到钓点</button>
  </div>
  
  <div class="info-panel">
    <div class="info-title" id="pointTitle">钓点位置</div>
    <div class="info-coord">
      纬度: <span id="latDisplay">--</span> | 
      经度: <span id="lonDisplay">--</span>
    </div>
    <div class="tips" id="fishingTips" style="display: none;">
      <span class="tip-title" style="color: #1976d2; font-weight: bold;">🎣 船钓卫星图识别指南</span>
      <span class="tip-item">• 🌑 深色阴影区 = 暗礁/礁石区（鱼群聚集）</span>
      <span class="tip-item">• 📏 颜色突变线 = 深浅交界（鱼道）</span>
      <span class="tip-item">• 〰️ 细长阴影 = 水下沟槽/海沟</span>
      <span class="tip-item">• ⬛ 不规则深色斑块 = 沉船/人工鱼礁</span>
    </div>
  </div>

  <script>
    var map;
    var marker;
    var currentLayer = 'satellite'; // 'satellite' or 'vector'
    var targetLat, targetLon, targetTitle;
    
    // 获取URL参数
    function getUrlParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }
    
    function initMap() {
      // 获取传入的坐标
      targetLat = parseFloat(getUrlParam('lat')) || 23.1291;
      targetLon = parseFloat(getUrlParam('lon')) || 113.2644;
      targetTitle = decodeURIComponent(getUrlParam('title') || '钓点位置');
      
      // 更新显示
      document.getElementById('pointTitle').textContent = targetTitle;
      document.getElementById('latDisplay').textContent = targetLat.toFixed(6);
      document.getElementById('lonDisplay').textContent = targetLon.toFixed(6);
      
      // 创建地图
      map = new T.Map('mapDiv', {
        projection: 'EPSG:4326'
      });
      
      // 设置中心点和缩放级别（卫星图可以放大到更高层级）
      map.centerAndZoom(new T.LngLat(targetLon, targetLat), 15);
      
      // 添加卫星图层
      addSatelliteLayer();
      
      // 添加标记点
      addMarker();
      
      // 显示船钓提示
      document.getElementById('fishingTips').style.display = 'block';
      
      // 隐藏加载
      document.getElementById('loading').style.display = 'none';
    }
    
    function addSatelliteLayer() {
      // 移除所有图层
      map.clearOverlays();
      
      // 添加天地图卫星图层
      var satelliteLayer = new T.TileLayer(
        'http://t0.tianditu.gov.cn/img_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=img&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=c6abc72f35da7d4565e99e0cef4443ae',
        { minZoom: 1, maxZoom: 18 }
      );
      
      // 添加注记图层（道路、地名）
      var labelLayer = new T.TileLayer(
        'http://t0.tianditu.gov.cn/cia_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cia&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=c6abc72f35da7d4565e99e0cef4443ae',
        { minZoom: 1, maxZoom: 18 }
      );
      
      map.addLayer(satelliteLayer);
      map.addLayer(labelLayer);
      
      currentLayer = 'satellite';
      document.getElementById('layerIcon').textContent = '🗺️';
      document.getElementById('layerText').textContent = '标准';
      document.getElementById('satelliteBtn').classList.add('active');
    }
    
    function addVectorLayer() {
      map.clearOverlays();
      
      // 添加天地图矢量图层
      var vectorLayer = new T.TileLayer(
        'http://t0.tianditu.gov.cn/vec_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=vec&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=c6abc72f35da7d4565e99e0cef4443ae',
        { minZoom: 1, maxZoom: 18 }
      );
      
      var labelLayer = new T.TileLayer(
        'http://t0.tianditu.gov.cn/cva_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cva&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=c6abc72f35da7d4565e99e0cef4443ae',
        { minZoom: 1, maxZoom: 18 }
      );
      
      map.addLayer(vectorLayer);
      map.addLayer(labelLayer);
      
      currentLayer = 'vector';
      document.getElementById('layerIcon').textContent = '🛰️';
      document.getElementById('layerText').textContent = '卫星';
      document.getElementById('satelliteBtn').classList.remove('active');
    }
    
    function toggleLayer() {
      if (currentLayer === 'satellite') {
        addVectorLayer();
      } else {
        addSatelliteLayer();
      }
      addMarker(); // 重新添加标记
    }
    
    function addMarker() {
      // 创建标记点
      var icon = new T.Icon({
        iconUrl: 'https://webapp-assets.tianditu.gov.cn/static/marker.png',
        iconSize: new T.Point(25, 35),
        iconAnchor: new T.Point(12, 35)
      });
      
      marker = new T.Marker(new T.LngLat(targetLon, targetLat), { icon: icon });
      map.addOverLay(marker);
      
      // 添加信息窗口
      var infoWindow = new T.InfoWindow(targetTitle);
      marker.openInfoWindow(infoWindow);
    }
    
    function zoomIn() {
      map.zoomIn();
    }
    
    function zoomOut() {
      map.zoomOut();
    }
    
    function backToCenter() {
      map.panTo(new T.LngLat(targetLon, targetLat));
      map.setZoom(15);
    }
    
    // 页面加载完成后初始化地图
    window.onload = initMap;
  </script>
</body>
</html>
