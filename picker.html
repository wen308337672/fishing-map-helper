<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>天地图卫星地图 - 钓鱼助手</title>
  <script src="https://api.tianditu.gov.cn/api?v=4.0&tk=c6abc72f35da7d4565e99e0cef4443ae"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #mapDiv {
      width: 100%;
      height: 100%;
    }
    .header {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 70px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 12px 15px;
      z-index: 1000;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .header-title {
      font-size: 15px;
      font-weight: bold;
      color: #333;
    }
    .header-subtitle {
      font-size: 12px;
      color: #888;
      margin-top: 3px;
    }
    .controls {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      background: rgba(255, 255, 255, 0.95);
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #333;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 50px;
      justify-content: center;
    }
    .btn:active {
      background: rgba(240, 240, 240, 0.95);
    }
    .btn.active {
      background: #2196f3;
      color: white;
    }
    .info-panel {
      position: absolute;
      bottom: 80px;
      left: 10px;
      right: 10px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 1000;
      max-height: 35vh;
      overflow-y: auto;
    }
    .info-title {
      font-size: 15px;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }
    .info-coord {
      font-size: 13px;
      color: #666;
      font-family: monospace;
      margin-bottom: 10px;
    }
    .tips {
      font-size: 12px;
      color: #888;
      line-height: 1.8;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 20px 30px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 2000;
    }
    .confirm-btn {
      position: absolute;
      bottom: 20px;
      left: 10px;
      right: 10px;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .confirm-btn:active {
      opacity: 0.9;
    }
    .confirm-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .close-btn {
      position: absolute;
      bottom: 20px;
      left: 10px;
      right: 10px;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #666 0%, #999 100%);
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      display: none;
    }
    .close-btn:active {
      opacity: 0.9;
    }
    .center-cross {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      pointer-events: none;
      z-index: 500;
    }
    .center-cross::before,
    .center-cross::after {
      content: '';
      position: absolute;
      background: rgba(255, 68, 68, 0.8);
    }
    .center-cross::before {
      width: 2px;
      height: 40px;
      left: 50%;
      transform: translateX(-50%);
    }
    .center-cross::after {
      width: 40px;
      height: 2px;
      top: 50%;
      transform: translateY(-50%);
    }
    .center-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      background: #ff4444;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 4px rgba(0,0,0,0.3);
    }
    .click-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -70px);
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      pointer-events: none;
      z-index: 500;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="loading" class="loading">正在加载卫星地图...</div>
  <div id="mapDiv"></div>

  <!-- 中心十字准星 -->
  <div class="center-cross" id="centerCross">
    <div class="center-dot"></div>
  </div>
  <div class="click-hint" id="clickHint">点击地图选择钓点位置</div>

  <div class="header">
    <div class="header-title" id="headerTitle">选择钓点位置</div>
    <div class="header-subtitle" id="headerSubtitle">移动地图，中心对准目标位置</div>
  </div>

  <div class="controls">
    <button class="btn" id="satelliteBtn" onclick="toggleLayer()">
      <span id="layerIcon">🗺️</span>
      <span id="layerText">标准</span>
    </button>
    <button class="btn" onclick="zoomIn()">➕</button>
    <button class="btn" onclick="zoomOut()">➖</button>
    <button class="btn" onclick="locateMe()">🎯</button>
  </div>

  <div class="info-panel" id="infoPanel">
    <div class="info-title">选中位置</div>
    <div class="info-coord">
      纬度: <span id="latDisplay">--</span> | 经度: <span id="lonDisplay">--</span>
    </div>
    <div class="tips">
      💡 移动地图让中心十字对准目标位置<br>
      🎣 卫星图识别指南<br>
      • 深色阴影区 = 暗礁/礁石区（鱼群聚集）<br>
      • 颜色突变线 = 深浅交界（鱼道）<br>
      • 细长阴影 = 水下沟槽/海沟
    </div>
  </div>

  <!-- 确认选择按钮 -->
  <button class="confirm-btn" id="confirmBtn" onclick="confirmLocation()">✓ 确认选择此位置</button>

  <!-- 关闭按钮（仅查看模式显示） -->
  <button class="close-btn" id="closeBtn" onclick="closePage()">关闭</button>

  <script>
    var map;
    var currentLayer = 'satellite';
    var selectedLat = null, selectedLon = null;
    var isInWx = false;
    var imgLayer, ciaLayer, vecLayer, cvaLayer;
    var myLat = null, myLon = null;
    var mode = 'picker'; // 'picker' 选点模式, 'view' 查看模式

    // 安全加载微信JS SDK
    function loadWxSDK() {
      var s = document.createElement('script');
      s.src = 'https://res.wx.qq.com/open/js/jweixin-1.3.2.js';
      s.onload = function() {
        if (window.wx && wx.miniProgram) {
          isInWx = true;
        }
      };
      s.onerror = function() {};
      document.head.appendChild(s);
    }

    // 获取URL参数
    function getUrlParam(name) {
      var params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    // 清除所有图层
    function clearLayers() {
      if (imgLayer) { map.removeLayer(imgLayer); imgLayer = null; }
      if (ciaLayer) { map.removeLayer(ciaLayer); ciaLayer = null; }
      if (vecLayer) { map.removeLayer(vecLayer); vecLayer = null; }
      if (cvaLayer) { map.removeLayer(cvaLayer); cvaLayer = null; }
    }

    function initMap() {
      // 获取模式
      mode = getUrlParam('mode') || 'picker';

      // 获取传入的坐标（如果有）
      var initLat = parseFloat(getUrlParam('lat'));
      var initLon = parseFloat(getUrlParam('lon'));

      // 判断是否有有效坐标
      var hasInitCoords = !isNaN(initLat) && !isNaN(initLon)
        && initLat >= -90 && initLat <= 90
        && initLon >= -180 && initLon <= 180;

      // 默认位置（广西北海）
      var centerLat = hasInitCoords ? initLat : 21.48;
      var centerLon = hasInitCoords ? initLon : 109.12;

      // 更新UI
      if (mode === 'view') {
        document.getElementById('headerTitle').textContent = '查看钓点位置';
        document.getElementById('headerSubtitle').textContent = '双指缩放查看周边结构';
        document.getElementById('clickHint').style.display = 'none';
        document.getElementById('centerCross').style.display = 'none';
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('closeBtn').style.display = 'block';
        document.getElementById('infoPanel').style.bottom = '80px';
      }

      // 创建地图
      map = new T.Map('mapDiv');
      map.centerAndZoom(new T.LngLat(centerLon, centerLat), 16);

      // 添加卫星图层
      addSatelliteLayer();

      // 如果有初始坐标，显示它
      if (hasInitCoords) {
        selectedLat = initLat;
        selectedLon = initLon;
        updateCoordDisplay();
      }

      // 监听地图移动事件（选点模式）
      if (mode === 'picker') {
        map.addEventListener('moveend', function() {
          var center = map.getCenter();
          selectedLat = center.lat;
          selectedLon = center.lng;
          updateCoordDisplay();
        });

        // 初始获取中心点坐标
        var center = map.getCenter();
        selectedLat = center.lat;
        selectedLon = center.lng;
        updateCoordDisplay();
      }

      // 隐藏加载
      document.getElementById('loading').style.display = 'none';

      // 尝试加载微信SDK
      loadWxSDK();

      // 自动定位
      autoLocate();
    }

    function updateCoordDisplay() {
      document.getElementById('latDisplay').textContent = selectedLat.toFixed(6);
      document.getElementById('lonDisplay').textContent = selectedLon.toFixed(6);
    }

    // 确认选择位置
    function confirmLocation() {
      if (selectedLat === null || selectedLon === null) {
        alert('请先选择位置');
        return;
      }

      if (isInWx && window.wx && wx.miniProgram) {
        // 返回坐标给小程序
        wx.miniProgram.postMessage({
          data: {
            type: 'locationSelected',
            lat: selectedLat,
            lon: selectedLon
          }
        });
        wx.miniProgram.navigateBack();
      } else {
        // 非微信环境，显示坐标
        alert('选中坐标：\n纬度: ' + selectedLat.toFixed(6) + '\n经度: ' + selectedLon.toFixed(6));
      }
    }

    // 关闭页面
    function closePage() {
      if (isInWx && window.wx && wx.miniProgram) {
        wx.miniProgram.navigateBack();
      } else {
        history.back();
      }
    }

    // 自动获取当前位置
    function autoLocate() {
      try {
        var lo = new T.Geolocation();
        lo.getCurrentPosition(
          function(e) {
            if (e.lnglat && e.lnglat.lng) {
              myLat = e.lnglat.lat;
              myLon = e.lnglat.lng;
              console.log('天地图定位成功: lat=' + myLat + ', lon=' + myLon);
            } else {
              html5Locate();
            }
          },
          function() {
            html5Locate();
          }
        );
      } catch(err) {
        html5Locate();
      }
    }

    // HTML5备用定位
    function html5Locate() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function(pos) {
            myLat = pos.coords.latitude;
            myLon = pos.coords.longitude;
            console.log('HTML5定位成功: lat=' + myLat + ', lon=' + myLon);
          },
          function(err) {
            console.log('定位失败: ' + err.message);
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
        );
      }
    }

    // 手动定位
    function locateMe() {
      if (myLat !== null && myLon !== null) {
        map.panTo(new T.LngLat(myLon, myLat));
        map.setZoom(16);
      } else {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('loading').textContent = '正在定位...';
        autoLocate();
        setTimeout(function() {
          document.getElementById('loading').style.display = 'none';
          if (myLat !== null) {
            map.panTo(new T.LngLat(myLon, myLat));
            map.setZoom(16);
          } else {
            alert('定位失败，请检查是否允许了位置权限');
          }
        }, 5000);
      }
    }

    function addSatelliteLayer() {
      clearLayers();
      imgLayer = new T.TileLayer(
        'https://t0.tianditu.gov.cn/img_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=img&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=c6abc72f35da7d4565e99e0cef4443ae',
        { minZoom: 1, maxZoom: 18 }
      );
      ciaLayer = new T.TileLayer(
        'https://t0.tianditu.gov.cn/cia_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cia&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=c6abc72f35da7d4565e99e0cef4443ae',
        { minZoom: 1, maxZoom: 18 }
      );
      map.addLayer(imgLayer);
      map.addLayer(ciaLayer);
      currentLayer = 'satellite';
      document.getElementById('layerIcon').textContent = '🗺️';
      document.getElementById('layerText').textContent = '标准';
      document.getElementById('satelliteBtn').classList.add('active');
    }

    function addVectorLayer() {
      clearLayers();
      vecLayer = new T.TileLayer(
        'https://t0.tianditu.gov.cn/vec_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=vec&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=c6abc72f35da7d4565e99e0cef4443ae',
        { minZoom: 1, maxZoom: 18 }
      );
      cvaLayer = new T.TileLayer(
        'https://t0.tianditu.gov.cn/cva_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cva&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=c6abc72f35da7d4565e99e0cef4443ae',
        { minZoom: 1, maxZoom: 18 }
      );
      map.addLayer(vecLayer);
      map.addLayer(cvaLayer);
      currentLayer = 'vector';
      document.getElementById('layerIcon').textContent = '🛰️';
      document.getElementById('layerText').textContent = '卫星';
      document.getElementById('satelliteBtn').classList.remove('active');
    }

    function toggleLayer() {
      if (currentLayer === 'satellite') {
        addVectorLayer();
      } else {
        addSatelliteLayer();
      }
    }

    function zoomIn() { map.zoomIn(); }
    function zoomOut() { map.zoomOut(); }

    window.onload = initMap;
  </script>
</body>
</html>
