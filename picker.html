<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>天地图卫星地图 - 钓鱼助手</title>
  <script src="https://api.tianditu.gov.cn/api?v=4.0&tk=c6abc72f35da7d4565e99e0cef4443ae"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #mapDiv {
      width: 100%;
      height: 100%;
    }
    .header {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 70px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 12px 15px;
      z-index: 1000;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .header-title {
      font-size: 15px;
      font-weight: bold;
      color: #333;
    }
    .header-subtitle {
      font-size: 12px;
      color: #888;
      margin-top: 3px;
    }
    .controls {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      background: rgba(255, 255, 255, 0.95);
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #333;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 50px;
      justify-content: center;
    }
    .btn:active {
      background: rgba(240, 240, 240, 0.95);
    }
    .btn.active {
      background: #2196f3;
      color: white;
    }
    .info-panel {
      position: absolute;
      bottom: 20px;
      left: 10px;
      right: 10px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 1000;
      max-height: 50vh;
      transition: max-height 0.3s ease;
      overflow: hidden;
    }
    .info-panel.collapsed {
      max-height: 44px;
    }
    .info-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .info-panel-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .info-title {
      font-size: 15px;
      font-weight: bold;
      color: #333;
    }
    .info-coord {
      font-size: 12px;
      color: #888;
      font-family: monospace;
    }
    .info-toggle {
      font-size: 18px;
      color: #999;
      transition: transform 0.3s;
      line-height: 1;
    }
    .info-panel.collapsed .info-toggle {
      transform: rotate(180deg);
    }
    .info-body {
      padding: 0 15px 15px 15px;
    }
    .tips {
      font-size: 12px;
      color: #888;
      line-height: 1.8;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 20px 30px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 2000;
    }
    .close-btn {
      position: absolute;
      bottom: 20px;
      left: 10px;
      right: 10px;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #1976d2 0%, #2196f3 100%);
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .close-btn:active {
      opacity: 0.9;
    }
    .my-coord {
      font-size: 12px;
      color: #4CAF50;
      font-family: monospace;
      margin-top: 3px;
    }
  </style>
</head>
<body>
  <div id="loading" class="loading">正在加载卫星地图...</div>
  <div id="mapDiv"></div>

  <div class="header">
    <div class="header-title" id="headerTitle">天地图卫星影像</div>
    <div class="header-subtitle" id="headerSubtitle">双指缩放查看钓点周边结构</div>
  </div>

  <div class="controls">
    <button class="btn" id="satelliteBtn" onclick="toggleLayer()">
      <span id="layerIcon">🗺️</span>
      <span id="layerText">标准</span>
    </button>
    <button class="btn" onclick="zoomIn()">➕</button>
    <button class="btn" onclick="zoomOut()">➖</button>
    <button class="btn" onclick="backToCenter()">📍</button>
    <button class="btn" id="locateBtn" onclick="locateMe()">🎯</button>
  </div>

  <div class="info-panel" id="infoPanel">
    <div class="info-panel-header" onclick="toggleInfoPanel()">
      <div class="info-panel-left">
        <span class="info-title" id="pointTitle">钓点位置</span>
        <span class="info-coord">
          <span id="latDisplay">--</span>, <span id="lonDisplay">--</span>
        </span>
      </div>
      <span class="info-toggle" id="infoToggle">▼</span>
    </div>
    <div class="info-body" id="infoBody">
      <div class="my-coord" id="myCoordDisplay" style="display:none;">
        🎯 当前位置: <span id="myLatDisplay">--</span>, <span id="myLonDisplay">--</span>
      </div>
      <div class="tips">
        🎣 卫星图识别指南<br>
        • 深色阴影区 = 暗礁/礁石区（鱼群聚集）<br>
        • 颜色突变线 = 深浅交界（鱼道）<br>
        • 细长阴影 = 水下沟槽/海沟<br>
        • 不规则深色斑块 = 沉船/人工鱼礁
      </div>
    </div>
  </div>

  <!-- 小程序内关闭按钮（浏览器中隐藏） -->
  <button class="close-btn" id="closeBtn" style="display:none;" onclick="goBack()">关闭</button>

  <script>
    var map;
    var marker;
    var myLocationMarker;
    var currentLayer = 'satellite';
    var targetLat, targetLon, targetTitle;
    var hasTargetParams = false; // 是否有传入坐标
    var isInWx = false;
    var imgLayer, ciaLayer, vecLayer, cvaLayer;
    var myLat = null, myLon = null;
    var infoPanelCollapsed = false;

    // 安全加载微信JS SDK
    function loadWxSDK() {
      var s = document.createElement('script');
      s.src = 'https://res.wx.qq.com/open/js/jweixin-1.3.2.js';
      s.onload = function() {
        if (window.wx && wx.miniProgram) {
          isInWx = true;
          document.getElementById('closeBtn').style.display = 'block';
        }
      };
      s.onerror = function() {};
      document.head.appendChild(s);
    }

    // 获取URL参数
    function getUrlParam(name) {
      var params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    // 清除所有图层
    function clearLayers() {
      if (imgLayer) { map.removeLayer(imgLayer); imgLayer = null; }
      if (ciaLayer) { map.removeLayer(ciaLayer); ciaLayer = null; }
      if (vecLayer) { map.removeLayer(vecLayer); vecLayer = null; }
      if (cvaLayer) { map.removeLayer(cvaLayer); cvaLayer = null; }
    }

    // 信息面板展开/收起
    function toggleInfoPanel() {
      infoPanelCollapsed = !infoPanelCollapsed;
      var panel = document.getElementById('infoPanel');
      if (infoPanelCollapsed) {
        panel.classList.add('collapsed');
      } else {
        panel.classList.remove('collapsed');
      }
    }

    function initMap() {
      // 获取传入的坐标
      targetLat = parseFloat(getUrlParam('lat'));
      targetLon = parseFloat(getUrlParam('lon'));
      targetTitle = decodeURIComponent(getUrlParam('title') || '');

      // 判断是否有有效坐标参数
      hasTargetParams = !isNaN(targetLat) && !isNaN(targetLon)
        && targetLat >= -90 && targetLat <= 90
        && targetLon >= -180 && targetLon <= 180;

      if (!hasTargetParams) {
        // 没有传入坐标，等定位成功后再显示
        targetLat = 21.48;
        targetLon = 109.12;
        targetTitle = '正在定位...';
      }

      if (!targetTitle) targetTitle = '钓点位置';

      // 更新显示
      document.getElementById('pointTitle').textContent = targetTitle;
      document.getElementById('latDisplay').textContent = targetLat.toFixed(4);
      document.getElementById('lonDisplay').textContent = targetLon.toFixed(4);

      // 创建地图（使用默认投影 EPSG:3857）
      map = new T.Map('mapDiv');
      map.centerAndZoom(new T.LngLat(targetLon, targetLat), 16);

      // 添加卫星图层
      addSatelliteLayer();

      // 如果有传入坐标，添加标记
      if (hasTargetParams) {
        addMarker();
      }

      // 隐藏加载
      document.getElementById('loading').style.display = 'none';

      // 尝试加载微信SDK
      loadWxSDK();

      // 自动获取当前位置
      document.getElementById('locateBtn').style.background = '#ffeb3b';
      autoLocate();

      console.log('地图初始化完成: lat=' + targetLat + ', lon=' + targetLon);
    }

    // 定位成功后的处理
    function onLocationSuccess(lat, lon) {
      myLat = lat;
      myLon = lon;
      console.log('定位成功: lat=' + myLat + ', lon=' + myLon);

      // 显示当前位置坐标
      document.getElementById('myCoordDisplay').style.display = 'block';
      document.getElementById('myLatDisplay').textContent = myLat.toFixed(4);
      document.getElementById('myLonDisplay').textContent = myLon.toFixed(4);

      // 添加当前位置标记
      addMyLocationMarker();

      // 恢复按钮颜色
      document.getElementById('locateBtn').style.background = '';

      // 如果没有传入目标坐标，把地图中心移到当前位置
      if (!hasTargetParams) {
        targetLat = myLat;
        targetLon = myLon;
        targetTitle = '当前位置';
        document.getElementById('pointTitle').textContent = targetTitle;
        document.getElementById('latDisplay').textContent = myLat.toFixed(4);
        document.getElementById('lonDisplay').textContent = myLon.toFixed(4);
        document.getElementById('headerSubtitle').textContent = '卫星图钓点查看';
        map.centerAndZoom(new T.LngLat(myLon, myLat), 16);
      }
    }

    // 自动获取当前位置（使用天地图定位API）
    function autoLocate() {
      try {
        var lo = new T.Geolocation();
        lo.getCurrentPosition(
          function(e) {
            if (e.lnglat && e.lnglat.lng) {
              onLocationSuccess(e.lnglat.lat, e.lnglat.lng);
            } else {
              console.log('天地图定位返回空，尝试HTML5');
              html5Locate();
            }
          },
          function() {
            console.log('天地图定位失败，尝试HTML5');
            html5Locate();
          }
        );
      } catch(err) {
        console.log('天地图Geolocation不可用: ' + err.message);
        html5Locate();
      }
    }

    // HTML5备用定位
    function html5Locate() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function(pos) {
            onLocationSuccess(pos.coords.latitude, pos.coords.longitude);
          },
          function(err) {
            console.log('HTML5定位失败: ' + err.message);
            document.getElementById('locateBtn').style.background = '';
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
        );
      } else {
        document.getElementById('locateBtn').style.background = '';
      }
    }

    // 手动定位（点击按钮）
    function locateMe() {
      if (myLat !== null && myLon !== null) {
        map.panTo(new T.LngLat(myLon, myLat));
        map.setZoom(16);
        return;
      }
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading').textContent = '正在定位...';
      document.getElementById('locateBtn').style.background = '#ffeb3b';

      // 重置状态，重新定位
      myLat = null;
      myLon = null;
      autoLocate();

      setTimeout(function() {
        document.getElementById('loading').style.display = 'none';
        if (myLat !== null) {
          map.panTo(new T.LngLat(myLon, myLat));
          map.setZoom(16);
        } else {
          alert('定位失败，请检查是否允许了位置权限');
        }
      }, 8000);
    }

    // 添加当前位置标记（绿色圆点）
    function addMyLocationMarker() {
      if (myLocationMarker) {
        map.removeOverLay(myLocationMarker);
      }
      var greenIcon = new T.Icon({
        iconUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="%234CAF5033" stroke="%234CAF50" stroke-width="2"/><circle cx="12" cy="12" r="5" fill="%234CAF50" stroke="white" stroke-width="2"/></svg>',
        iconSize: new T.Point(28, 28),
        iconAnchor: new T.Point(14, 14)
      });
      myLocationMarker = new T.Marker(new T.LngLat(myLon, myLat), { icon: greenIcon });
      map.addOverLay(myLocationMarker);
    }

    function addSatelliteLayer() {
      clearLayers();
      imgLayer = new T.TileLayer(
        'https://t0.tianditu.gov.cn/img_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=img&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=c6abc72f35da7d4565e99e0cef4443ae',
        { minZoom: 1, maxZoom: 18 }
      );
      ciaLayer = new T.TileLayer(
        'https://t0.tianditu.gov.cn/cia_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cia&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=c6abc72f35da7d4565e99e0cef4443ae',
        { minZoom: 1, maxZoom: 18 }
      );
      map.addLayer(imgLayer);
      map.addLayer(ciaLayer);
      currentLayer = 'satellite';
      document.getElementById('layerIcon').textContent = '🗺️';
      document.getElementById('layerText').textContent = '标准';
      document.getElementById('satelliteBtn').classList.add('active');
    }

    function addVectorLayer() {
      clearLayers();
      vecLayer = new T.TileLayer(
        'https://t0.tianditu.gov.cn/vec_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=vec&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=c6abc72f35da7d4565e99e0cef4443ae',
        { minZoom: 1, maxZoom: 18 }
      );
      cvaLayer = new T.TileLayer(
        'https://t0.tianditu.gov.cn/cva_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cva&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=c6abc72f35da7d4565e99e0cef4443ae',
        { minZoom: 1, maxZoom: 18 }
      );
      map.addLayer(vecLayer);
      map.addLayer(cvaLayer);
      currentLayer = 'vector';
      document.getElementById('layerIcon').textContent = '🛰️';
      document.getElementById('layerText').textContent = '卫星';
      document.getElementById('satelliteBtn').classList.remove('active');
    }

    function toggleLayer() {
      if (currentLayer === 'satellite') {
        addVectorLayer();
      } else {
        addSatelliteLayer();
      }
      if (hasTargetParams) addMarker();
      if (myLat !== null) addMyLocationMarker();
    }

    function addMarker() {
      if (marker) { map.removeOverLay(marker); }
      var icon = new T.Icon({
        iconUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff4444"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>',
        iconSize: new T.Point(32, 32),
        iconAnchor: new T.Point(16, 32)
      });
      marker = new T.Marker(new T.LngLat(targetLon, targetLat), { icon: icon });
      map.addOverLay(marker);
      var infoWindow = new T.InfoWindow(targetTitle);
      marker.openInfoWindow(infoWindow);
    }

    function zoomIn() { map.zoomIn(); }
    function zoomOut() { map.zoomOut(); }

    function backToCenter() {
      if (hasTargetParams) {
        map.panTo(new T.LngLat(targetLon, targetLat));
        map.setZoom(16);
      } else if (myLat !== null) {
        map.panTo(new T.LngLat(myLon, myLat));
        map.setZoom(16);
      }
    }

    function goBack() {
      if (window.wx && wx.miniProgram) {
        wx.miniProgram.navigateBack();
      } else {
        history.back();
      }
    }

    window.onload = initMap;
  </script>
</body>
</html>
